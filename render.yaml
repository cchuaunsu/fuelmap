# Render blueprint — deploys LITRO (the Metro Manila pump-price index)
# as one password-protected web service on the free plan.
#
# The service name below sets the public URL: name "litro" serves at
# https://litro.onrender.com. onrender.com subdomains are globally
# unique, so if "litro" is already taken this deploy will fail — pick
# an available name (e.g. litro-ph) and it becomes <name>.onrender.com.
#
# At deploy time Render asks you to fill in the two secret values:
# - FIE_ACCESS_PASSWORD: the password the site asks for (you choose it)
# - FIE_DATABASE_URL: connection string of a free Neon Postgres database
#   (neon.tech) so price history and the adjustment ledger persist across
#   restarts. Leave empty to run on ephemeral SQLite instead.
#
# Free-plan notes:
# - The service sleeps after ~15 min idle; the first visit wakes it
#   (roughly a minute), after which it is instant.
services:
  - type: web
    name: litro
    runtime: docker
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: FIE_ACCESS_PASSWORD
        sync: false
      - key: FIE_DATABASE_URL
        sync: false
      - key: FIE_REFRESH_COOLDOWN_S
        value: "15"
      # On wake, refresh in the background when stored data is older
      # than this many hours - visitors get current prices without
      # pressing Refresh, and the sleeping free plan stays fresh.
      - key: FIE_BOOTSTRAP_MAX_AGE_H
        value: "1"
